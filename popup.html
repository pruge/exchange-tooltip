<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>USD → KRW</title>
    <link rel="stylesheet" href="tooltip.css" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        background: #fafafa;
        color: #1f1f1f;
      }
      h2 {
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin: 0 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .section {
        margin-bottom: 14px;
      }
      .rate {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
        margin: 2px 0 2px;
      }
      .rate.error {
        color: #c0392b;
        font-size: 13px;
        font-weight: 600;
      }
      .meta {
        font-size: 11px;
        color: #666;
        margin-bottom: 8px;
        min-height: 14px;
      }
      button {
        width: 100%;
        padding: 7px 10px;
        font-size: 12px;
        border: 1px solid #d0d0d0;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        background: #f0f0f0;
      }

      .theme-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }
      .theme-pick {
        position: relative;
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 8px;
        padding: 2px;
        transition: border-color 100ms ease;
      }
      .theme-pick:hover {
        border-color: #cbd5e1;
      }
      .theme-pick.selected {
        border-color: #3b82f6;
      }
      .theme-pick input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .pswatch {
        height: 30px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
      }
      .pswatch--dark {
        background: #18181b;
        color: #fff;
      }
      .pswatch--soft-dark {
        background: #334155;
        color: #f8fafc;
      }
      .pswatch--blue {
        background: #1e3a8a;
        color: #fff;
      }
      .pswatch--warm {
        background: #d8cfbc;
        color: #1c1917;
        border: 1px solid #b8af9b;
      }
      .theme-name {
        font-size: 10px;
        color: #666;
        text-align: center;
        margin-top: 3px;
      }

      .footer {
        margin-top: 8px;
        text-align: right;
      }
      .footer a {
        font-size: 11px;
        color: #3b82f6;
        text-decoration: none;
        cursor: pointer;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <h2>현재 환율</h2>
      <div id="rate" class="rate">조회 중…</div>
      <div id="meta" class="meta"></div>
      <button id="refresh">새로 고침</button>
    </div>

    <div class="section">
      <h2>테마</h2>
      <div class="theme-row">
        <label class="theme-pick" data-theme="dark">
          <input type="radio" name="theme" value="dark" />
          <div class="pswatch pswatch--dark">₩2,720</div>
          <div class="theme-name">다크</div>
        </label>
        <label class="theme-pick" data-theme="soft-dark">
          <input type="radio" name="theme" value="soft-dark" />
          <div class="pswatch pswatch--soft-dark">₩2,720</div>
          <div class="theme-name">소프트</div>
        </label>
        <label class="theme-pick" data-theme="blue">
          <input type="radio" name="theme" value="blue" />
          <div class="pswatch pswatch--blue">₩2,720</div>
          <div class="theme-name">블루</div>
        </label>
        <label class="theme-pick" data-theme="warm">
          <input type="radio" name="theme" value="warm" />
          <div class="pswatch pswatch--warm">₩2,720</div>
          <div class="theme-name">웜</div>
        </label>
      </div>
    </div>

    <div class="footer">
      <a id="openOptions">자세한 옵션 →</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
